{% extends "base.html" %}
{% block title %}Hero bewerken{% endblock %}
{% block page_title %}Hero sectie{% endblock %}
{% set h = content.get('hero', {}) %}
{% block content %}
<form method="POST" action="{{ url_for('content_hero') }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start">

    <!-- LEFT: English -->
    <div class="card">
      <div class="card-header"><div class="card-title">🇬🇧 English</div></div>
      <div class="card-body" style="display:flex;flex-direction:column;gap:16px">
        <div class="form-group">
          <label class="form-label">Badge</label>
          <input type="text" name="badge_en" class="form-control" value="{{ h.get('badge_en','') }}" placeholder="The operating system for the Agentic Enterprise">
        </div>
        <div class="form-row cols-2">
          <div class="form-group"><label class="form-label">Headline prefix</label><input type="text" name="headline_pre_en" class="form-control" value="{{ h.get('headline_pre_en','') }}" placeholder="The next step in"></div>
          <div class="form-group"><label class="form-label">Headline accent (blue)</label><input type="text" name="headline_accent_en" class="form-control" value="{{ h.get('headline_accent_en','') }}" placeholder="automation"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Headline suffix</label>
          <input type="text" name="headline_post_en" class="form-control" value="{{ h.get('headline_post_en','') }}" placeholder="and collaboration.">
        </div>
        <div class="form-group">
          <label class="form-label">Subtitle</label>
          <textarea name="subtitle_en" class="form-control" rows="3">{{ h.get('subtitle_en','') }}</textarea>
        </div>
        <div class="form-row cols-2">
          <div class="form-group"><label class="form-label">CTA Primary</label><input type="text" name="cta_primary_en" class="form-control" value="{{ h.get('cta_primary_en','') }}" placeholder="Request a Demo →"></div>
          <div class="form-group"><label class="form-label">CTA Secondary</label><input type="text" name="cta_secondary_en" class="form-control" value="{{ h.get('cta_secondary_en','') }}" placeholder="Explore the Platform"></div>
        </div>
        <div class="form-row cols-2">
          <div class="form-group"><label class="form-label">Agents badge title</label><input type="text" name="agents_title_en" class="form-control" value="{{ h.get('agents_title_en','') }}" placeholder="Multi-agent orchestration"></div>
          <div class="form-group"><label class="form-label">Agents badge sub</label><input type="text" name="agents_sub_en" class="form-control" value="{{ h.get('agents_sub_en','') }}" placeholder="Ready to deploy..."></div>
        </div>
      </div>
    </div>

    <!-- RIGHT: Dutch -->
    <div class="card">
      <div class="card-header"><div class="card-title">🇳🇱 Nederlands</div></div>
      <div class="card-body" style="display:flex;flex-direction:column;gap:16px">
        <div class="form-group">
          <label class="form-label">Badge</label>
          <input type="text" name="badge_nl" class="form-control" value="{{ h.get('badge_nl','') }}" placeholder="Het besturingssysteem voor de Agentic Enterprise">
        </div>
        <div class="form-row cols-2">
          <div class="form-group"><label class="form-label">Headline prefix</label><input type="text" name="headline_pre_nl" class="form-control" value="{{ h.get('headline_pre_nl','') }}" placeholder="De volgende stap in"></div>
          <div class="form-group"><label class="form-label">Headline accent (blauw)</label><input type="text" name="headline_accent_nl" class="form-control" value="{{ h.get('headline_accent_nl','') }}" placeholder="automatisering"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Headline suffix</label>
          <input type="text" name="headline_post_nl" class="form-control" value="{{ h.get('headline_post_nl','') }}" placeholder="en samenwerking.">
        </div>
        <div class="form-group">
          <label class="form-label">Subtitel</label>
          <textarea name="subtitle_nl" class="form-control" rows="3">{{ h.get('subtitle_nl','') }}</textarea>
        </div>
        <div class="form-row cols-2">
          <div class="form-group"><label class="form-label">CTA Primair</label><input type="text" name="cta_primary_nl" class="form-control" value="{{ h.get('cta_primary_nl','') }}" placeholder="Demo aanvragen →"></div>
          <div class="form-group"><label class="form-label">CTA Secundair</label><input type="text" name="cta_secondary_nl" class="form-control" value="{{ h.get('cta_secondary_nl','') }}" placeholder="Ontdek het platform"></div>
        </div>
        <div class="form-row cols-2">
          <div class="form-group"><label class="form-label">Agents badge titel</label><input type="text" name="agents_title_nl" class="form-control" value="{{ h.get('agents_title_nl','') }}" placeholder="Multi-agent orkestratie"></div>
          <div class="form-group"><label class="form-label">Agents badge sub</label><input type="text" name="agents_sub_nl" class="form-control" value="{{ h.get('agents_sub_nl','') }}" placeholder="Direct inzetbaar..."></div>
        </div>
      </div>
    </div>
  </div>

  <div style="position:sticky;bottom:0;background:#f0f2f5;padding:16px 0;margin-top:24px;display:flex;gap:12px;align-items:center">
    <button type="submit" class="btn btn-primary">Opslaan</button>
    <a href="{{ url_for('content_index') }}" class="btn btn-ghost">Annuleren</a>
    <a href="https://aiventitytool.netlify.app" target="_blank" class="btn btn-ghost btn-sm" style="margin-left:auto">↗ Bekijk live</a>
  </div>
</form>
{% endblock %}
