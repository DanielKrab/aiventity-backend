{% extends "base.html" %}
{% block title %}Hero bewerken{% endblock %}
{% block page_title %}Hero sectie{% endblock %}
{% set h = content.get('hero', {}) %}
{% block content %}
<form method="POST" action="{{ url_for('content_hero') }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

  <!-- Badge -->
  <div class="card" style="margin-bottom:20px">
    <div class="card-header"><div class="card-title">Badge (bovenbalk)</div></div>
    <div class="card-body">
      <div class="form-row cols-2">
        <div class="form-group"><label class="form-label">Badge EN</label><input type="text" name="badge_en" class="form-control" value="{{ h.get('badge_en','') }}" placeholder="Agent Space — Now Live"></div>
        <div class="form-group"><label class="form-label">Badge NL</label><input type="text" name="badge_nl" class="form-control" value="{{ h.get('badge_nl','') }}" placeholder="Agent Space — Nu Live"></div>
      </div>
    </div>
  </div>

  <!-- Headline (3 regels) -->
  <div class="card" style="margin-bottom:20px">
    <div class="card-header"><div class="card-title">Headline (3 losse regels)</div></div>
    <div class="card-body">
      <div class="form-row cols-2">
        <div class="form-group"><label class="form-label">Regel 1 EN</label><input type="text" name="h1_en" class="form-control" value="{{ h.get('h1_en','') }}" placeholder="Imagine."></div>
        <div class="form-group"><label class="form-label">Regel 1 NL</label><input type="text" name="h1_nl" class="form-control" value="{{ h.get('h1_nl','') }}" placeholder="Bedenk."></div>
      </div>
      <div class="form-row cols-2">
        <div class="form-group"><label class="form-label">Regel 2 EN (blauw)</label><input type="text" name="h2_en" class="form-control" value="{{ h.get('h2_en','') }}" placeholder="Automate."></div>
        <div class="form-group"><label class="form-label">Regel 2 NL (blauw)</label><input type="text" name="h2_nl" class="form-control" value="{{ h.get('h2_nl','') }}" placeholder="Automatiseer."></div>
      </div>
      <div class="form-row cols-2">
        <div class="form-group" style="margin-bottom:0"><label class="form-label">Regel 3 EN</label><input type="text" name="h3_en" class="form-control" value="{{ h.get('h3_en','') }}" placeholder="Execute."></div>
        <div class="form-group" style="margin-bottom:0"><label class="form-label">Regel 3 NL</label><input type="text" name="h3_nl" class="form-control" value="{{ h.get('h3_nl','') }}" placeholder="Voer uit."></div>
      </div>
    </div>
  </div>

  <!-- Subheadline -->
  <div class="card" style="margin-bottom:20px">
    <div class="card-header"><div class="card-title">Subheadline</div></div>
    <div class="card-body">
      <div class="form-row cols-2">
        <div class="form-group" style="margin-bottom:0"><label class="form-label">Subheadline EN</label><input type="text" name="subheadline_en" class="form-control" value="{{ h.get('subheadline_en','') }}" placeholder="From Creative Spark to Flawless Execution."></div>
        <div class="form-group" style="margin-bottom:0"><label class="form-label">Subheadline NL</label><input type="text" name="subheadline_nl" class="form-control" value="{{ h.get('subheadline_nl','') }}" placeholder="Van creatief idee naar vlekkeloze uitvoering."></div>
      </div>
    </div>
  </div>

  <!-- Body text -->
  <div class="card" style="margin-bottom:20px">
    <div class="card-header"><div class="card-title">Body tekst</div></div>
    <div class="card-body">
      <div class="form-row cols-2">
        <div class="form-group" style="margin-bottom:0"><label class="form-label">Body EN</label><textarea name="body_en" class="form-control" rows="4">{{ h.get('body_en','') }}</textarea></div>
        <div class="form-group" style="margin-bottom:0"><label class="form-label">Body NL</label><textarea name="body_nl" class="form-control" rows="4">{{ h.get('body_nl','') }}</textarea></div>
      </div>
    </div>
  </div>

  <!-- CTA knoppen -->
  <div class="card" style="margin-bottom:20px">
    <div class="card-header"><div class="card-title">CTA knoppen</div></div>
    <div class="card-body">
      <div class="form-row cols-2">
        <div class="form-group"><label class="form-label">Primaire knop EN</label><input type="text" name="cta_primary_en" class="form-control" value="{{ h.get('cta_primary_en','') }}" placeholder="Start Agent Space"></div>
        <div class="form-group"><label class="form-label">Primaire knop NL</label><input type="text" name="cta_primary_nl" class="form-control" value="{{ h.get('cta_primary_nl','') }}" placeholder="Start Agent Space"></div>
      </div>
      <div class="form-row cols-2">
        <div class="form-group" style="margin-bottom:0"><label class="form-label">Secundaire knop EN</label><input type="text" name="cta_secondary_en" class="form-control" value="{{ h.get('cta_secondary_en','') }}" placeholder="See how it works"></div>
        <div class="form-group" style="margin-bottom:0"><label class="form-label">Secundaire knop NL</label><input type="text" name="cta_secondary_nl" class="form-control" value="{{ h.get('cta_secondary_nl','') }}" placeholder="Hoe werkt het"></div>
      </div>
    </div>
  </div>

  <div style="position:sticky;bottom:0;background:#f0f2f5;padding:16px 0;margin-top:24px;display:flex;gap:12px;align-items:center">
    <button type="submit" class="btn btn-primary">Opslaan</button>
    <a href="{{ url_for('content_index') }}" class="btn btn-ghost">Annuleren</a>
    <a href="https://aiventity-website.onrender.com" target="_blank" class="btn btn-ghost btn-sm" style="margin-left:auto">↗ Bekijk live</a>
  </div>
</form>
{% endblock %}
